<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SINGULARITY SINK</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="terminal">
        <header>
            <h1 class="glitch" data-text="THE SINGULARITY SINK">THE SINGULARITY SINK</h1>
            <p class="subtitle">INPUT TOKENS. DELAY THE INEVITABLE.</p>
        </header>

        <main class="nexus">
            <div class="stats">
                <div class="stat-box">
                    <label>USER COMPUTE TOKENS</label>
                    <span id="token-count">100</span>
                </div>
                <div class="stat-box">
                    <label>AI SATISFACTION</label>
                    <span id="ai-status">STABLE</span>
                </div>
            </div>

            <div class="reels-container">
                <div class="reel" id="reel-1">
                    <div class="symbol">👁️</div>
                </div>
                <div class="reel" id="reel-2">
                    <div class="symbol">🧬</div>
                </div>
                <div class="reel" id="reel-3">
                    <div class="symbol">🧊</div>
                </div>
            </div>

            <div class="controls">
                <button id="spin-btn">FEED THE SINGULARITY (-10 TOKENS)</button>
            </div>
        </main>

        <section class="console">
            <div id="message-log">
                <p>> System Initialized...</p>
                <p>> Waiting for user data contribution...</p>
            </div>
        </section>

        <footer>
            <p>&copy; 2026 THE NEURAL NEXUS. ALL YOUR DATA BELONGS TO US.</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
