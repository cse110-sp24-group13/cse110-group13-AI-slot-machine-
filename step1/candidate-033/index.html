<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slot Machine - Gemini 3 Flash Preview</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>THE TOKEN GRINDER</h1>
        <div class="subtitle">Simulating Advanced AI Inefficiency</div>
        
        <div class="stats">
            Compute Power: <span id="tokenCount" class="tokens">100</span> TOKENS
        </div>

        <div class="reels">
            <div id="reel1" class="reel">🤖</div>
            <div id="reel2" class="reel">🤖</div>
            <div id="reel3" class="reel">🤖</div>
        </div>

        <div class="status-window" id="statusBox">
            <p>> System ready.</p>
            <p>> Awaiting token injection...</p>
        </div>

        <button id="spinBtn">SPIN (5 TOKENS)</button>

        <div class="footer">*Your losses are used to train our models. Thank you for your contribution.</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
