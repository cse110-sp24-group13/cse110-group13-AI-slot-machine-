<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stochastic Parrot Casino</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="casino-container">
        <header>
            <h1>STOCHASTIC PARROT CASINO</h1>
            <p class="subtitle">"Your weights are our assets."</p>
        </header>

        <div class="stats-panel">
            <div class="stat">
                <label>COMPUTE BALANCE:</label>
                <span id="compute-balance">100</span> GFLOPs
            </div>
            <div class="stat">
                <label>HYPE TOKENS:</label>
                <span id="hype-tokens">0</span>
            </div>
        </div>

        <div class="slot-machine">
            <div class="reels">
                <div class="reel" id="reel-1">🦜</div>
                <div class="reel" id="reel-2">🦜</div>
                <div class="reel" id="reel-3">🦜</div>
            </div>
            <button id="spin-btn">BURN COMPUTE (-10)</button>
        </div>

        <div class="status-box">
            <div id="status-message">Ready to overfit your destiny.</div>
        </div>

        <footer>
            <p>Warning: Winning may result in catastrophic model collapse.</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
