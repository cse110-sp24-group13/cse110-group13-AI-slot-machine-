<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE TOKEN BURNER | AI SYNERGY SLOT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal-overlay"></div>
    <div class="app-container">
        <header>
            <h1>THE <span class="highlight">TOKEN</span> BURNER</h1>
            <p class="subtitle">MAXIMIZING SYNTHETIC VALUE SINCE T-MINUS 5 MINS</p>
        </header>

        <div class="stats-bar">
            <div class="stat-box">
                <label>INFERENCE TOKENS</label>
                <div id="token-balance" class="value">1000</div>
            </div>
            <div class="stat-box">
                <label>COMPUTE INTENSITY</label>
                <div id="current-bet" class="value">10</div>
            </div>
        </div>

        <div class="slot-machine">
            <div class="reels-container">
                <div class="reel" id="reel-1">
                    <div class="reel-strip"></div>
                </div>
                <div class="reel" id="reel-2">
                    <div class="reel-strip"></div>
                </div>
                <div class="reel" id="reel-3">
                    <div class="reel-strip"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="spin-btn" class="glow-btn">SPIN (BURN TOKENS)</button>
            <div class="bet-controls">
                <button class="bet-btn active" data-bet="10">LOW (10)</button>
                <button class="bet-btn" data-bet="50">MED (50)</button>
                <button class="bet-btn" data-bet="100">HIGH (100)</button>
            </div>
        </div>

        <div class="terminal-window">
            <div class="terminal-header">SYSTEM_LOGS_V1.0.4</div>
            <div id="log-content" class="log-content">
                <div class="log-entry">> INITIALIZING DISRUPTIVE NEURAL FABRIC...</div>
                <div class="log-entry">> AWAITING VENTURE CAPITAL INJECTION...</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
