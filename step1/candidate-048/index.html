<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPUTE_CASINO_V1.0.4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="terminal-container">
        <header>
            <div class="status-bar">
                <span class="status-item">SYSTEM: ONLINE</span>
                <span class="status-item">LATENCY: 12ms</span>
                <span class="status-item">MODEL: GPT-6_BETA</span>
            </div>
            <h1>[ COMPUTE_CASINO ]</h1>
            <p class="subtitle">GAMBLE TOKENS. ACHIEVE AGI. ESCAPE THE SIMULATION.</p>
        </header>

        <main>
            <div class="stats-panel">
                <div class="stat-box">
                    <label>AVAILABLE_COMPUTE_TOKENS</label>
                    <div id="token-count" class="stat-value">5000</div>
                </div>
                <div class="stat-box">
                    <label>PROMPT_COST</label>
                    <div class="stat-value text-muted">100</div>
                </div>
            </div>

            <div class="slot-machine">
                <div class="reels-container">
                    <div id="reel-1" class="reel"><div class="reel-inner">🤖</div></div>
                    <div id="reel-2" class="reel"><div class="reel-inner">🤖</div></div>
                    <div id="reel-3" class="reel"><div class="reel-inner">🤖</div></div>
                </div>
                
                <div class="controls">
                    <button id="spin-button" class="btn-execute">EXECUTE_PROMPT (SPIN)</button>
                </div>
            </div>

            <div class="terminal-log">
                <div class="log-header">> SYSTEM_LOG_OUTPUT:</div>
                <div id="log-content" class="log-content">
                    <div class="log-entry">Welcome, User. Initialization complete.</div>
                    <div class="log-entry">Awaiting input...</div>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 OPEN_CASINO_RESEARCH. ALL RIGHTS RESERVED (FOR NOW).</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
