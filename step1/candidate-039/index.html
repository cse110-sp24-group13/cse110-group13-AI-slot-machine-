<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Stochastic Parrots Slot Machine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI HYPE GENERATOR 3000</h1>
            <p class="subtitle">A Stochastic Parrot Inference Engine</p>
        </header>

        <main>
            <div id="stats">
                <div class="stat-box">
                    <span class="label">Compute Tokens:</span>
                    <span id="tokens">100</span>
                </div>
                <div class="stat-box">
                    <span class="label">Intelligence Points:</span>
                    <span id="iq">0</span>
                </div>
            </div>

            <div class="slot-machine">
                <div class="reel-container">
                    <div class="reel" id="reel-1">🤖</div>
                    <div class="reel" id="reel-2">🤖</div>
                    <div class="reel" id="reel-3">🤖</div>
                </div>
                
                <div class="controls">
                    <div class="bet-control">
                        <label for="bet-input">Bet Amount:</label>
                        <input type="number" id="bet-input" value="10" min="1" max="100">
                    </div>
                    <button id="spin-button">INFER (SPIN)</button>
                </div>
            </div>

            <div id="status-display">
                <p id="status-message">Awaiting human input for training...</p>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Hallucinated by Gemini CLI | "It's not a bug, it's a feature."</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
