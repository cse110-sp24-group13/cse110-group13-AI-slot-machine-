<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Stochastic Parrot - AI Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>The Stochastic Parrot</h1>
            <p class="subtitle">Burn Compute. Generate Hype.</p>
        </header>

        <div class="stats">
            <div class="stat-box">
                <span class="label">Inference Credits</span>
                <span id="credits">100</span>
            </div>
            <div class="stat-box">
                <span class="label">VC Funding</span>
                <span id="funding">$0</span>
            </div>
        </div>

        <div class="slot-machine">
            <div class="reels">
                <div class="reel" id="reel1">🤖</div>
                <div class="reel" id="reel2">🤖</div>
                <div class="reel" id="reel3">🤖</div>
            </div>
            <div class="controls">
                <button id="spin-btn">SPIN (10 Credits)</button>
            </div>
        </div>

        <div class="log" id="game-log">
            <p>Welcome, Founder. Burn some credits to achieve AGI.</p>
        </div>

        <div class="shop">
            <h3>Hype Marketplace</h3>
            <button id="buy-hype-btn" class="secondary-btn">Buy "Pivot to Web4" (50 Credits)</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
