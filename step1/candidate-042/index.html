<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Grinder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI TOKEN GRINDER</h1>
            <p class="subtitle">"Burn your tokens for the dream of AGI"</p>
        </header>

        <div class="stats-bar">
            <div class="stat-box">
                <span class="label">TOKENS:</span>
                <span id="token-count" class="value">1000</span>
            </div>
            <div class="stat-box">
                <span class="label">HYPE METER:</span>
                <div class="hype-bar">
                    <div id="hype-fill" class="hype-fill"></div>
                </div>
            </div>
        </div>

        <div class="slot-machine">
            <div class="reel-container">
                <div id="reel1" class="reel"></div>
            </div>
            <div class="reel-container">
                <div id="reel2" class="reel"></div>
            </div>
            <div class="reel-container">
                <div id="reel3" class="reel"></div>
            </div>
        </div>

        <div class="controls">
            <button id="spin-btn" class="btn primary">GENERATE TOKENS (10 🪙)</button>
            <button id="pitch-btn" class="btn secondary">PITCH TO VC</button>
        </div>

        <div id="message-area" class="message-area">
            Ready to hallucinate?
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
