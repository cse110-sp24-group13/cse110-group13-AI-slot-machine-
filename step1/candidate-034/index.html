<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-CORE-v0.34 | Inference Engine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="terminal-container">
        <header>
            <div class="status-bar">
                <span>SYSTEM: ONLINE</span>
                <span>CORE-v0.34</span>
                <span id="uptime">UPTIME: 00:00:00</span>
            </div>
            <h1>HAL-UCINATE INFERENCE ENGINE</h1>
        </header>

        <main>
            <div class="reels-container">
                <div class="reel" id="reel1">
                    <div class="reel-strip">
                        <span>✨</span><span>🧠</span><span>🔋</span><span>💰</span><span>📉</span><span>🍄</span>
                    </div>
                </div>
                <div class="reel" id="reel2">
                    <div class="reel-strip">
                        <span>✨</span><span>🧠</span><span>🔋</span><span>💰</span><span>📉</span><span>🍄</span>
                    </div>
                </div>
                <div class="reel" id="reel3">
                    <div class="reel-strip">
                        <span>✨</span><span>🧠</span><span>🔋</span><span>💰</span><span>📉</span><span>🍄</span>
                    </div>
                </div>
                <div class="scanline"></div>
            </div>

            <div class="console">
                <div id="console-output">> Initializing AI-CORE... Done.
> Awaiting prompt...</div>
            </div>

            <div class="controls">
                <div class="stat-box">
                    <label>COMPUTE BALANCE</label>
                    <div id="balance">1000</div>
                </div>
                <div class="input-group">
                    <label>INFERENCE COST</label>
                    <input type="number" id="bet-amount" value="10" min="1" step="10">
                </div>
                <button id="spin-button">EXECUTE INFERENCE</button>
            </div>
        </main>

        <footer>
            <div class="paytable">
                <span>✨AGI: 100x</span>
                <span>🧠LLM: 20x</span>
                <span>🔋GPU: 10x</span>
                <span>💰VC: 5x</span>
                <span>📉LOSS: -50%</span>
                <span>🍄MUSH: 0x</span>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
