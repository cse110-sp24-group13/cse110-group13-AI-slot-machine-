<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Burner 3000</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="crt-effect">
    <div class="container">
        <header>
            <h1>TOKEN BURNER 3000</h1>
            <p class="subtitle">Optimizing Human Utility via GPU-Induced Dopamine</p>
        </header>

        <main>
            <div id="stats" class="terminal-panel">
                <div class="stat">
                    <span class="label">INPUT TOKENS (CREDIT):</span>
                    <span id="input-tokens" class="value">1000</span>
                </div>
                <div class="stat">
                    <span class="label">OUTPUT TOKENS (WIN):</span>
                    <span id="output-tokens" class="value">0</span>
                </div>
            </div>

            <div id="slot-machine" class="machine-frame">
                <div class="reels-container">
                    <div id="reel-1" class="reel">?</div>
                    <div id="reel-2" class="reel">?</div>
                    <div id="reel-3" class="reel">?</div>
                </div>
                <div class="controls">
                    <button id="lever" class="lever-btn">RUN INFERENCE</button>
                    <button id="buy-tokens" class="secondary-btn">INJECT DATA (+500 TOKENS)</button>
                </div>
            </div>

            <div id="console" class="terminal-panel">
                <div class="console-header">SYSTEM LOG</div>
                <div id="log-content" class="log-content">
                    <div>> Initializing Context Window...</div>
                    <div>> Ready for Token Injection.</div>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Skynet Gambling Solutions. "Your loss is our alignment."</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
