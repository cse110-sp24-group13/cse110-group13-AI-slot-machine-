<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPE ENGINE v1.0 | AI Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>HYPE ENGINE <span class="version">v1.0</span></h1>
            <p class="tagline">Gamble your Series A on "Meaningless Tokens"</p>
        </header>

        <main class="slot-machine">
            <div class="stats">
                <div class="stat-box">
                    <label>Compute Credits</label>
                    <div id="credits" class="value">100</div>
                </div>
                <div class="stat-box">
                    <label>Meaningless Tokens</label>
                    <div id="tokens" class="value">0</div>
                </div>
            </div>

            <div class="reels-container">
                <div class="reel" id="reel1">🤖</div>
                <div class="reel" id="reel2">🤖</div>
                <div class="reel" id="reel3">🤖</div>
            </div>

            <div class="status-bar">
                <div id="status-text">SYSTEM READY: Awaiting Venture Capital...</div>
            </div>

            <div class="controls">
                <button id="spin-button" class="btn-primary">GENERATE INSIGHTS</button>
            </div>
        </main>

        <footer>
            <p>Built with 🧠 (Hallucinated) & 💸 (Burning Cash)</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
