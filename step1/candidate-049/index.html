<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM: Large Luck Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>LLM: Large Luck Machine</h1>
            <p class="subtitle">"The best way to predict the future is to hallucinate it."</p>
        </header>

        <div id="stats-panel">
            <div class="stat-box">
                <span class="label">Compute Credits:</span>
                <span id="credit-count" class="value">100</span>
            </div>
            <div class="stat-box">
                <span class="label">Spin Cost:</span>
                <span class="value">10 Credits</span>
            </div>
        </div>

        <div id="slot-machine">
            <div class="reel-container">
                <div class="reel" id="reel-1">🤖</div>
            </div>
            <div class="reel-container">
                <div class="reel" id="reel-2">🤖</div>
            </div>
            <div class="reel-container">
                <div class="reel" id="reel-3">🤖</div>
            </div>
        </div>

        <div id="controls">
            <button id="spin-button">Train Model (Spin)</button>
        </div>

        <div id="console-output">
            <div class="console-line">Initializing Weights...</div>
            <div class="console-line">Ready to Scrap Internet...</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
