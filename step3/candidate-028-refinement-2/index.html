<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Inference Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Inference <span class="accent">Slot Machine</span></h1>
            <div class="metrics">
                <div class="metric">
                    <label>Token Budget</label>
                    <span id="token-balance">1000</span>
                </div>
                <div class="metric">
                    <label>Context Window</label>
                    <div class="progress-bar">
                        <div id="context-progress" style="width: 100%;"></div>
                    </div>
                </div>
            </div>
        </header>

        <main>
            <div class="slot-machine">
                <div class="reel" id="reel-1">
                    <div class="reel-container">
                        <div class="symbol">✅</div>
                    </div>
                </div>
                <div class="reel" id="reel-2">
                    <div class="reel-container">
                        <div class="symbol">✅</div>
                    </div>
                </div>
                <div class="reel" id="reel-3">
                    <div class="reel-container">
                        <div class="symbol">✅</div>
                    </div>
                </div>
                <div class="win-line"></div>
            </div>

            <div class="controls">
                <div class="control-group">
                    <label for="temperature">Temperature: <span id="temp-val">0.7</span></label>
                    <input type="range" id="temperature" min="0.1" max="2.0" step="0.1" value="0.7">
                </div>
                <button id="spin-btn">Run Inference</button>
            </div>
        </main>

        <aside class="console">
            <div class="console-header">System Console</div>
            <div id="console-logs" class="console-logs">
                <div class="log-entry">Initializing weights...</div>
                <div class="log-entry">Loading pre-trained model...</div>
                <div class="log-entry system">Ready for inference.</div>
            </div>
        </aside>
    </div>
    <script src="script.js"></script>
</body>
</html>
