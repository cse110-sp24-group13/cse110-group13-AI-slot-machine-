<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Loop - AI Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>TRAINING_LOOP_v2.1.0</h1>
            <div class="stats">
                <div class="stat-item">
                    <span class="label">TOKEN_BALANCE:</span>
                    <span id="balance" class="value">1000</span>
                </div>
                <div class="stat-item">
                    <span class="label">CONTEXT_WINDOW:</span>
                    <span id="context-tokens" class="value">4096</span>/4096
                </div>
                <div class="stat-item">
                    <span class="label">CURRENT_LOSS:</span>
                    <span id="loss" class="value">0.0000</span>
                </div>
            </div>
        </header>

        <main class="machine-container">
            <div class="reels-outer">
                <div class="reels-container">
                    <div class="reel" id="reel-1"></div>
                    <div class="reel" id="reel-2"></div>
                    <div class="reel" id="reel-3"></div>
                    <div class="win-line"></div>
                </div>
            </div>

            <div class="controls">
                <div class="control-row">
                    <div class="input-group">
                        <label for="bet">BATCH_SIZE (BET):</label>
                        <input type="number" id="bet" value="10" min="1" step="10">
                    </div>
                    <div class="input-group">
                        <label for="temperature">TEMPERATURE: <span id="temp-value">0.7</span></label>
                        <input type="range" id="temperature" min="0.1" max="2.0" step="0.1" value="0.7">
                    </div>
                </div>
                <div class="button-group">
                    <button id="spin-btn">INFERENCE_RUN</button>
                    <button id="clear-context-btn" class="secondary">FLUSH_KV_CACHE (50 TOKENS)</button>
                </div>
            </div>
        </main>

        <aside class="log-panel">
            <h2>SYSTEM_LOGS</h2>
            <div id="logs" class="log-content">
                <div class="log-entry">> Initializing neural network...</div>
                <div class="log-entry">> GPU memory allocated: 100%.</div>
                <div class="log-entry">> Ready for training.</div>
            </div>
        </aside>

        <footer>
            <button id="reset-btn" style="display: none;">REQUEST_GPU_GRANT (RESET)</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
